name: uellow
description: Uellow Marketplace — v2 mobile app
publish_to: 'none'
version: 2.2.46+246

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  qr_flutter: ^4.1.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # v2.1.64 — system-tray push notifications (FCM)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  # phone OTP via Firebase Auth (Firebase sends the SMS — no gateway)
  firebase_auth: ^5.3.4
  http: ^1.2.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  share_plus: ^10.0.2
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  mobile_scanner: ^6.0.2
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  app_links: ^6.3.2
  flutter_local_notifications: ^17.2.4
  path_provider: ^2.1.4
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  # v2.0.39 — Custom nav icons (PNG/SVG upload)
  flutter_svg: ^2.0.10
  # v2.2.40 — realistic brand glyphs for the social-media row (Account screen)
  font_awesome_flutter: ^10.7.0
  # v2.0.83 — Reels tab (TikTok-style vertical video feed)
  video_player: ^2.9.2
  record: ^6.2.1
  audioplayers: ^6.6.0
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/pay_knet.png
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Black.ttf
          weight: 900
