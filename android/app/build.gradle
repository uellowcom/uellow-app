plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // v2.1.64 — Firebase Cloud Messaging
    id "com.google.gms.google-services"
}

android {
    namespace = "com.uellow.uellow"
    // camera 1.5.0 (mobile_scanner 6) يتطلّب compileSdk 35+/AGP 8.6+
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        // flutter_local_notifications needs java.time desugaring on
        // minSdk < 26. Without coreLibraryDesugaringEnabled the AAR
        // check fails the release build.
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // v2.2.01 — unified on the Play Store package (per ali@uellow):
        // GitHub APKs and the Play listing are now the SAME app.
        // (namespace stays com.uellow.uellow — internal code path only.)
        applicationId = "com.uellow.app"
        // v2.2.41 — minSdk 23 (Android 6.0): required by androidx.camera
        // (camera-core 1.5.0 via mobile_scanner, the admin barcode scanner)
        // and record_android, both of which declare minSdk 23. API 21/22
        // (Android 5.x, 2014-15) is <1% of devices, so this is a safe floor.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled = true
    }

    // v2.2.07 — Google Play upload key (generated 2026-06-06, reset
    // requested in Play Console). Used ONLY when UELLOW_SIGN=upload so
    // direct-download APKs keep the debug signature (in-place updates).
    signingConfigs {
        upload {
            // CI (Codemagic): keystore path + passwords من متغيّرات البيئة.
            // محلياً (السيرفر): من /root/secrets.
            def ciStore = System.getenv('UELLOW_KEYSTORE_PATH')
            def hostPwFile = new File('/root/secrets/uellow-upload-2026.password.txt')
            if (ciStore != null && !ciStore.isEmpty()) {
                storeFile file(ciStore)
                storePassword System.getenv('UELLOW_KEYSTORE_PASSWORD') ?: ''
                keyAlias System.getenv('UELLOW_KEY_ALIAS') ?: 'uellow-upload'
                keyPassword (System.getenv('UELLOW_KEY_PASSWORD')
                    ?: System.getenv('UELLOW_KEYSTORE_PASSWORD') ?: '')
            } else {
                storeFile file('/root/secrets/uellow-upload-2026.jks')
                storePassword hostPwFile.exists() ? hostPwFile.text.trim() : ''
                keyAlias 'uellow-upload'
                keyPassword hostPwFile.exists() ? hostPwFile.text.trim() : ''
            }
        }
    }

    buildTypes {
        release {
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = (System.getenv('UELLOW_SIGN') == 'upload')
                ? signingConfigs.upload : signingConfigs.debug
            // TikTok SDK pulls in optional Play-Billing refs; keep our proguard
            // rules ( -dontwarn ) applied so R8 doesn't fail on missing classes.
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // v2.2.38 — upload native debug symbols so Play can symbolicate
            // crashes/ANRs (clears the "no debug symbols" warning).
            ndk {
                debugSymbolLevel 'FULL'
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // TikTok Business SDK (Events Manager — TikTok App ID 7651731222326050834)
    implementation 'com.github.tiktok:tiktok-business-android-sdk:1.5.0'
    // app life-cycle listening (required by the SDK)
    implementation 'androidx.lifecycle:lifecycle-process:2.3.1'
    implementation 'androidx.lifecycle:lifecycle-common-java8:2.3.1'
    // Google install referrer (install attribution)
    implementation 'com.android.installreferrer:installreferrer:2.2'
}
