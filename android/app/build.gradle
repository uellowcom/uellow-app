plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // v2.1.64 — Firebase Cloud Messaging
    id "com.google.gms.google-services"
}

android {
    namespace = "com.uellow.uellow"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        // flutter_local_notifications needs java.time desugaring on
        // minSdk < 26. Without coreLibraryDesugaringEnabled the AAR
        // check fails the release build.
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // v2.2.01 — unified on the Play Store package (per ali@uellow):
        // GitHub APKs and the Play listing are now the SAME app.
        // (namespace stays com.uellow.uellow — internal code path only.)
        applicationId = "com.uellow.app"
        minSdk = 23   // record_android (voice) requires API 23+ (Android 6.0)
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled = true
    }

    // v2.2.07 — Google Play upload key (generated 2026-06-06, reset
    // requested in Play Console). Used ONLY when UELLOW_SIGN=upload so
    // direct-download APKs keep the debug signature (in-place updates).
    signingConfigs {
        upload {
            storeFile file('/root/secrets/uellow-upload-2026.jks')
            storePassword new File('/root/secrets/uellow-upload-2026.password.txt').exists()
                ? new File('/root/secrets/uellow-upload-2026.password.txt').text.trim() : ''
            keyAlias 'uellow-upload'
            keyPassword new File('/root/secrets/uellow-upload-2026.password.txt').exists()
                ? new File('/root/secrets/uellow-upload-2026.password.txt').text.trim() : ''
        }
    }

    buildTypes {
        release {
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = (System.getenv('UELLOW_SIGN') == 'upload')
                ? signingConfigs.upload : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}
