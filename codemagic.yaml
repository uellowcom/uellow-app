# Codemagic CI — iOS build + auto-upload to App Store Connect
# يبني على ماك سحابي، يوقّع تلقائياً بالـAPI Key، ويرفع لـTestFlight.
#
# قبل أول تشغيل، من Codemagic UI:
#   Teams > Integrations > App Store Connect > أضف الـAPI Key (.p8 + Key ID + Issuer ID)
#   وسمّ التكامل بالضبط: uellow_appstore
#
# التوقيع كله بالـAPI Key — مفيش باسوورد ولا متغيّرات مطلوبة منك.
# Bundle ID الحالي في المشروع: com.uellow.uellow  (لو مختلف على متجرك، عدّل bundle_identifier تحت)

workflows:
  ios-appstore:
    name: iOS — App Store release
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: uellow_appstore   # نفس اسم التكامل المربوط في Codemagic
    environment:
      flutter: 3.29.3                       # نفس إصدار الأسطول (16KB + Dart 3.7.2)
      xcode: latest
      cocoapods: default
      groups:
        - appstore                          # يحوي CERTIFICATE_PRIVATE_KEY (مفتاح ثابت)
      vars:
        BUNDLE_ID: "com.uellow.app"         # نفس المعرّف على App Store
        APP_APPLE_ID: "6769010765"          # Apple ID الرقمي للتطبيق (لحساب رقم البناء)
        IOS_VERSION: "4.1.14"               # نسخة iOS التسويقية (مستقلة عن أندرويد؛ لازم تكون أعلى من آخر نسخة على المتجر)
    scripts:
      - name: Flutter packages get
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Set up code signing (create cert + profile if missing)
        script: |
          # ينشئ شهادة التوزيع + بروفايل App Store تلقائياً لو مش موجودين.
          # ملاحظة: الـAPI Key لازم يكون دوره Admin أو App Manager عشان يقدر
          # يُنشئ شهادات؛ لو الدور Developer، الإنشاء بيفشل بصمت.
          set -e
          # 1) تأكد إن المفتاح الخاص الثابت موجود فعلاً
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "❌ CERTIFICATE_PRIVATE_KEY فاضي — أضِفه لمجموعة المتغيّرات 'appstore' في Codemagic (Secure)."
            exit 1
          fi
          keychain initialize
          # المفتاح مخزّن Base64 (سطر واحد) لتفادي تلف الأسطر عند اللصق؛ نفكّه لملف PEM
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/cm_cert_key.pem 2>/dev/null || true
          if ! grep -q "BEGIN RSA PRIVATE KEY\|BEGIN PRIVATE KEY" /tmp/cm_cert_key.pem 2>/dev/null; then
            echo "❌ المفتاح بعد فك Base64 مش PEM صالح — تأكد إنك لصقت نص Base64 كامل (سطر واحد) في المتغيّر."
            exit 1
          fi
          # 2) جِب/أنشئ شهادة التوزيع + بروفايل App Store بمفتاح خاص ثابت
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key=@file:/tmp/cm_cert_key.pem \
            --create \
            --verbose
          # 2b) بروفايل توقيع منفصل للـWidget Extension (Live Activity)
          #     bundle id لازم يكون بادئته = bundle id التطبيق المضيف.
          #     --create بينشئ الـApp ID لو مش موجود (المفتاح دوره Admin).
          app-store-connect fetch-signing-files "${BUNDLE_ID}.LiveActivity" \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key=@file:/tmp/cm_cert_key.pem \
            --create \
            --verbose
          keychain add-certificates
          xcode-project use-profiles --verbose
          echo "================ DIAGNOSTICS ================"
          echo "--- code signing identities in keychain ---"
          security find-identity -v -p codesigning || true
          echo "--- provisioning profiles installed ---"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "(none)"
          echo "--- export options plist ---"
          cat /Users/builder/export_options.plist 2>/dev/null || echo "(not generated)"
          echo "============================================"
          # 3) افشل فوراً وبوضوح لو مفيش أي شهادة توقيع صالحة في الـkeychain
          if ! security find-identity -v -p codesigning | grep -qiE "Apple (Distribution|Development)|iPhone (Distribution|Developer)"; then
            echo "❌ مفيش شهادة توقيع في الـkeychain بعد fetch-signing-files."
            echo "   الأسباب المحتملة: دور الـAPI Key مش Admin/App Manager، أو وصلت لحد شهادات التوزيع في Apple."
            exit 1
          fi
          echo "✅ شهادة التوقيع جاهزة في الـkeychain."
      - name: Build signed IPA
        script: |
          # نسخة iOS التسويقية مستقلة عن pubspec (أندرويد) — لازم تكون أعلى من آخر نسخة على App Store
          # رقم البناء = أعلى رقم على المتجر + 1 (يتفادى التعارض مع البناءات الموجودة)
          LATEST=$(app-store-connect get-latest-build-number "$APP_APPLE_ID" 2>/dev/null || echo "")
          if [ -n "$LATEST" ]; then BUILD=$((LATEST + 1)); else BUILD="$BUILD_NUMBER"; fi
          echo "Building iOS $IOS_VERSION (build $BUILD)"
          flutter build ipa --release \
            --build-name="$IOS_VERSION" \
            --build-number="$BUILD" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # يرفع البناء على App Store Connect ويدفعه تلقائياً لـ TestFlight.
        # الاختبار الداخلي (Internal Testing) لا يحتاج مراجعة Apple → يظهر فور المعالجة.
        # ملاحظة: الاختبار الخارجي (External groups) يحتاج Beta App Review + معلومات تواصل.
        submit_to_testflight: true
        submit_to_app_store: false          # خليه true عشان يروح لمراجعة App Store مباشرة

  # ───────────────────────── Android (Huawei AppGallery / مباشر) ─────────────────────────
  android-release:
    name: Android — APK + AAB (Huawei/AppGallery)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.29.3                       # نفس إصدار الأسطول
      groups:
        - android_signing                   # UELLOW_KEYSTORE_BASE64 + UELLOW_KEYSTORE_PASSWORD + UELLOW_KEY_ALIAS
      vars:
        UELLOW_SIGN: "upload"               # يوقّع بمفتاح الرفع (مش debug)
        UELLOW_KEYSTORE_PATH: "/tmp/uellow-upload.jks"
        UELLOW_KEY_ALIAS: "uellow-upload"
    scripts:
      - name: Decode signing keystore
        script: |
          if [ -z "$UELLOW_KEYSTORE_BASE64" ]; then
            echo "❌ UELLOW_KEYSTORE_BASE64 فاضي — أضِفه لمجموعة 'android_signing' في Codemagic."
            exit 1
          fi
          echo "$UELLOW_KEYSTORE_BASE64" | base64 --decode > "$UELLOW_KEYSTORE_PATH"
          echo "keystore decoded -> $UELLOW_KEYSTORE_PATH ($(wc -c < $UELLOW_KEYSTORE_PATH) bytes)"
      - name: Flutter packages get
        script: |
          flutter pub get
      - name: Build signed APK + AAB
        script: |
          flutter build apk --release
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

  # ───────────────────────── Huawei AppGallery (publish .aab via API) ─────────
  # AppGallery accepts the standard .aab via its Publishing API (is_aab:true) —
  # no special ".app" build needed; the manual web UI just demands ".app".
  # The Fastlane huawei_appgallery_connect plugin handles token→upload→submit.
  huawei-release:
    name: Huawei — AppGallery (publish AAB)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.29.3
      groups:
        - android_signing   # UELLOW_KEYSTORE_BASE64 + UELLOW_KEYSTORE_PASSWORD + UELLOW_KEY_ALIAS
        - app_gallery       # HUAWEI_CLIENT_ID + HUAWEI_CLIENT_SECRET + HUAWEI_APP_ID (Connect API key)
      vars:
        UELLOW_SIGN: "upload"
        UELLOW_KEYSTORE_PATH: "/tmp/uellow-upload.jks"
        UELLOW_KEY_ALIAS: "uellow-upload"
    scripts:
      - name: Decode signing keystore
        script: |
          if [ -z "$UELLOW_KEYSTORE_BASE64" ]; then
            echo "❌ UELLOW_KEYSTORE_BASE64 فاضي — مجموعة 'android_signing'."; exit 1
          fi
          echo "$UELLOW_KEYSTORE_BASE64" | base64 --decode > "$UELLOW_KEYSTORE_PATH"
      - name: Flutter packages get
        script: flutter pub get
      - name: Build signed AAB
        script: flutter build appbundle --release
      - name: Publish to Huawei AppGallery
        script: |
          if [ -z "$HUAWEI_CLIENT_ID" ] || [ -z "$HUAWEI_CLIENT_SECRET" ] || [ -z "$HUAWEI_APP_ID" ]; then
            echo "❌ مفاتيح Connect API ناقصة — أضِف HUAWEI_CLIENT_ID/SECRET/APP_ID لمجموعة 'app_gallery'."; exit 1
          fi
          cd android
          gem install bundler --no-document >/dev/null
          bundle install
          bundle exec fastlane huawei_upload
    artifacts:
      - build/app/outputs/bundle/release/*.aab
