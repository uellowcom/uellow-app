# Codemagic CI — iOS build + auto-upload to App Store Connect
# يبني على ماك سحابي، يوقّع تلقائياً بالـAPI Key، ويرفع لـTestFlight.
#
# قبل أول تشغيل، من Codemagic UI:
#   Teams > Integrations > App Store Connect > أضف الـAPI Key (.p8 + Key ID + Issuer ID)
#   وسمّ التكامل بالضبط: uellow_appstore
#
# التوقيع كله بالـAPI Key — مفيش باسوورد ولا متغيّرات مطلوبة منك.
# Bundle ID الحالي في المشروع: com.uellow.uellow  (لو مختلف على متجرك، عدّل bundle_identifier تحت)

workflows:
  ios-appstore:
    name: iOS — App Store release
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: uellow_appstore   # نفس اسم التكامل المربوط في Codemagic
    environment:
      flutter: 3.29.3                       # نفس إصدار الأسطول (16KB + Dart 3.7.2)
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.uellow.uellow"      # لو مختلف على متجرك، غيّره هنا
    scripts:
      - name: Flutter packages get
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Set up code signing (create cert + profile if missing)
        script: |
          # ينشئ شهادة التوزيع + بروفايل App Store تلقائياً لو مش موجودين
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //; s/+.*//')
          echo "Building $VERSION_NAME (build $BUILD_NUMBER)"
          flutter build ipa --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true          # ينزل أوتوماتيك على TestFlight
        submit_to_app_store: false          # خليه true عشان يروح للمراجعة مباشرة (قولّي وأفعلها)
